<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">LabHub dashboard screenshot</title>
  <desc id="desc">A screenshot-style overview of the LabHub research management dashboard.</desc>
  <rect width="1200" height="760" fill="#f5f7fb"/>
  <rect x="48" y="44" width="1104" height="672" rx="18" fill="#ffffff" stroke="#d9e1ec"/>
  <rect x="48" y="44" width="1104" height="72" rx="18" fill="#12324a"/>
  <rect x="48" y="86" width="1104" height="30" fill="#12324a"/>
  <text x="82" y="90" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#ffffff">LabHub</text>
  <text x="214" y="89" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#c8d8e8">Deep-Time Global Change Group</text>
  <rect x="918" y="68" width="180" height="26" rx="13" fill="#2e8b77"/>
  <text x="940" y="87" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">OpenClaw Platform</text>
  <rect x="74" y="148" width="218" height="536" rx="14" fill="#eef3f8"/>
  <text x="104" y="188" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#476173">Navigation</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#16384e">
    <rect x="96" y="216" width="158" height="34" rx="8" fill="#ffffff"/>
    <text x="116" y="238">Quests</text>
    <rect x="96" y="264" width="158" height="34" rx="8" fill="#dceee9"/>
    <text x="116" y="286">Members</text>
    <rect x="96" y="312" width="158" height="34" rx="8" fill="#ffffff"/>
    <text x="116" y="334">1-on-1 Meetings</text>
    <rect x="96" y="360" width="158" height="34" rx="8" fill="#ffffff"/>
    <text x="116" y="382">Group Meetings</text>
    <rect x="96" y="408" width="158" height="34" rx="8" fill="#ffffff"/>
    <text x="116" y="430">Mail</text>
    <rect x="96" y="456" width="158" height="34" rx="8" fill="#ffffff"/>
    <text x="116" y="478">EXP Levels</text>
  </g>
  <rect x="324" y="148" width="788" height="94" rx="14" fill="#f8fbff" stroke="#d9e1ec"/>
  <text x="354" y="186" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#12324a">Research Management Dashboard</text>
  <text x="354" y="218" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5b7182">Track quests, members, meetings, schedules, mail, and research progress in one place.</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="324" y="272" width="238" height="142" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
    <text x="352" y="310" font-size="15" font-weight="700" fill="#476173">Quest Progress</text>
    <text x="352" y="354" font-size="42" font-weight="700" fill="#2e8b77">9</text>
    <text x="414" y="350" font-size="15" fill="#5b7182">stages</text>
    <text x="352" y="382" font-size="15" fill="#5b7182">27 checkpoints per task</text>
    <rect x="596" y="272" width="238" height="142" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
    <text x="624" y="310" font-size="15" font-weight="700" fill="#476173">Member Profiles</text>
    <text x="624" y="354" font-size="42" font-weight="700" fill="#c05f3c">PhD</text>
    <text x="624" y="382" font-size="15" fill="#5b7182">Skills, papers, meetings</text>
    <rect x="868" y="272" width="244" height="142" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
    <text x="896" y="310" font-size="15" font-weight="700" fill="#476173">EXP and Levels</text>
    <text x="896" y="354" font-size="42" font-weight="700" fill="#4b6fb2">EXP</text>
    <text x="896" y="382" font-size="15" fill="#5b7182">Gamified research progress</text>
  </g>
  <rect x="324" y="444" width="788" height="214" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
  <text x="354" y="486" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#12324a">Recent Activity</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5b7182">
    <circle cx="362" cy="528" r="7" fill="#2e8b77"/>
    <text x="386" y="533">Quest checkpoints updated for manuscript preparation</text>
    <circle cx="362" cy="572" r="7" fill="#c05f3c"/>
    <text x="386" y="577">1-on-1 meeting notes and action items recorded</text>
    <circle cx="362" cy="616" r="7" fill="#4b6fb2"/>
    <text x="386" y="621">Group meeting schedule and mail notifications synced</text>
  </g>
